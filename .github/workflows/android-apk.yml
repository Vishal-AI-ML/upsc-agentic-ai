name: Build Android APK

# Build the APK in the cloud (no Android Studio needed on your PC).
# Run it manually from the Actions tab, or it runs when mobile/ changes.
on:
  workflow_dispatch: {}
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Sync web assets + config
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: upsc-ai-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
